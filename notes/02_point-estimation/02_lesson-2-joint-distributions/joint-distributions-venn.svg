<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title id="title">Venn diagram for the union of A and B</title>
  <desc id="desc">Two overlapping shaded circles labeled A and B inside a rectangular sample space.</desc>
  <rect x="20" y="20" width="380" height="220" fill="white" stroke="#8b0000" stroke-width="4"/>
  <circle cx="175" cy="130" r="72" fill="#8dd3e8" fill-opacity="0.85" stroke="#7189bd" stroke-width="4"/>
  <circle cx="245" cy="130" r="72" fill="#8dd3e8" fill-opacity="0.85" stroke="#7189bd" stroke-width="4"/>
  <text x="145" y="138" font-family="sans-serif" font-size="25" fill="#9b0015" text-anchor="middle">A</text>
  <text x="275" y="138" font-family="sans-serif" font-size="25" fill="#9b0015" text-anchor="middle">B</text>
</svg>
